<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experyment Gdynia - Tajemnice Głębin</title>
    <style>
        /* RESET & FONTS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Prevent scrollbars for the demo */
            background-color: #000;
        }

        /* CONTAINER */
        .ocean-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #001e36 0%, #000000 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* LIGHT RAYS (CAUSTICS) */
        .light-rays {
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: 
                repeating-linear-gradient(
                    90deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.03) 5%,
                    transparent 10%
                );
            transform: rotate(-20deg);
            animation: ray-sway 8s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes ray-sway {
            0% { transform: rotate(-20deg) translateX(0); }
            100% { transform: rotate(-15deg) translateX(-50px); }
        }

        /* BUBBLES */
        .bubble {
            position: absolute;
            bottom: -50px;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.1));
            border-radius: 50%;
            opacity: 0.6;
            animation: rise var(--duration) ease-in infinite;
            left: var(--left);
            width: var(--size);
            height: var(--size);
            z-index: 2;
        }

        @keyframes rise {
            0% {
                bottom: -50px;
                transform: translateX(0);
                opacity: 0;
            }
            50% {
                opacity: 0.8;
            }
            100% {
                bottom: 110vh;
                transform: translateX(var(--sway));
                opacity: 0;
            }
        }

        /* HERO CONTENT CARD (GLASSMORPHISM) */
        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            color: white;
            padding: 3rem 4rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 800px;
            transition: transform 0.1s ease-out;
        }

        /* TYPOGRAPHY */
        .subtitle {
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.9rem;
            color: #00d2ff;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            line-height: 1.1;
            background: linear-gradient(to right, #ffffff, #89cff0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        p.desc {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #e0e0e0;
            margin-bottom: 2.5rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* BUTTONS */
        .cta-button {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #00d2ff 0%, #007bff 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(0, 123, 255, 0.4);
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 123, 255, 0.6);
            filter: brightness(1.1);
        }

        /* LOGO MOCKUP */
        .logo {
            position: absolute;
            top: 30px;
            left: 30px;
            color: white;
            font-weight: bold;
            font-size: 1.5rem;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo span { color: #00d2ff; }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .hero-content { padding: 2rem; width: 90%; }
        }
    </style>
</head>
<body>

    <div class="logo">
        EXPERYMENT <span>GDYNIA</span>
    </div>

    <div class="ocean-container" id="scene">
        <!-- Animated Background Elements -->
        <div class="light-rays"></div>
        <div id="bubble-container"></div>

        <!-- Main Content -->
        <div class="hero-content" id="card">
            <div class="subtitle">Featured Exhibition</div>
            <h1>TAJEMNICE GŁĘBIN</h1>
            <p class="desc">
                Discover the unknown world beneath the surface. Experience the pressure, the darkness, and the incredible life forms of the deep ocean.
            </p>
            <a href="#" class="cta-button">Explore Exhibition</a>
        </div>
    </div>

    <script>
        // 1. BUBBLE GENERATOR
        const bubbleContainer = document.getElementById('bubble-container');
        const bubbleCount = 40; // Number of bubbles

        function createBubbles() {
            for (let i = 0; i < bubbleCount; i++) {
                const bubble = document.createElement('div');
                bubble.classList.add('bubble');
                
                // Randomize properties
                const size = Math.random() * 20 + 5 + 'px'; // 5px to 25px
                const left = Math.random() * 100 + 'vw';
                const duration = Math.random() * 10 + 5 + 's'; // 5s to 15s
                const sway = (Math.random() * 100 - 50) + 'px'; // -50px to 50px
                const delay = Math.random() * 5 + 's';

                // Apply styles
                bubble.style.setProperty('--size', size);
                bubble.style.setProperty('--left', left);
                bubble.style.setProperty('--duration', duration);
                bubble.style.setProperty('--sway', sway);
                bubble.style.animationDelay = delay;

                bubbleContainer.appendChild(bubble);
            }
        }

        createBubbles();

        // 2. MOUSE PARALLAX EFFECT
        const scene = document.getElementById('scene');
        const card = document.getElementById('card');

        scene.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth - e.pageX * 2) / 100;
            const y = (window.innerHeight - e.pageY * 2) / 100;

            // Move the card slightly opposite to mouse
            card.style.transform = `translateX(${x}px) translateY(${y}px)`;
            
            // Move rays slightly to create depth
            const rays = document.querySelector('.light-rays');
            rays.style.transform = `rotate(-20deg) translateX(${x * 2}px)`;
        });

    </script>
</body>
</html>
